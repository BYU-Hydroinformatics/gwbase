# GWBASE Workflow Configuration
# Edit this file to customize the analysis without modifying source code.

# ── Step 1: Stream Network Configuration ──────────────────────────────────────
network:
  # Gage IDs to manually remove from terminal gage list.
  # Reason: Jordan River gages are intermediate outlets within the basin,
  # not true terminal outlets to Great Salt Lake.
  manual_remove_gages:
    - 10171000  # JORDAN RIVER AT SALT LAKE CITY
    - 10167000  # JORDAN RIVER AT 1700 SOUTH AT SALT LAKE CITY

  # Gage IDs to manually add to the terminal gage list.
  # Reason: These drain directly to Great Salt Lake / Utah Lake but are not
  # automatically detected as terminal because they sit upstream of Jordan River
  # in the raw network topology.
  manual_add_gages:
    - 10163000  # PROVO RIVER AT PROVO
    - 10153100  # HOBBLE CREEK AT 1650 WEST AT SPRINGVILLE
    - 10152000  # SPANISH FORK NEAR LAKE SHORE

# ── Step 6: Elevation-Based Filtering ─────────────────────────────────────────
filtering:
  # Maximum allowed vertical distance (meters) between well WTE and stream
  # reach elevation. Wells with WTE more than this distance below the streambed
  # are excluded as hydrologically disconnected.
  elevation_buffer_m: 30.0

# ── Well Data Quality Filters (applied at Step 4 AND Step 8) ──────────────────
# These two parameters are the single quality gate for all analyses.
#   Step 4: filters raw field measurements before PCHIP interpolation.
#   Step 8: filters paired monthly records so data_with_deltas.csv and all
#           derived lag files only contain pairs that pass both criteria.
# Changing these values and re-running from Step 4 produces a new filtered
# dataset that every downstream analysis will use automatically.
well_quality:
  # Minimum number of field measurements required per well (Step 4)
  # and minimum paired monthly records per well-gage pair (Step 8).
  min_measurements: 20
  # Minimum record span (years) at both the raw-measurement level (Step 4)
  # and the paired monthly level (Step 8).
  min_years: 3

# ── Analysis: Gage Exclusions ─────────────────────────────────────────────────
analysis:
  # Gages to exclude from the final ΔWTE–ΔQ analysis (post-Step 1).
  # Typically the same as manual_remove_gages but kept separate so that
  # network delineation and analysis exclusions can diverge if needed.
  exclude_gages:
    - "10167000"
    - "10171000"
